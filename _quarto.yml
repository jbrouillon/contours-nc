project:
  type: website
  output-dir: docs

website:
  title: "Contours"
  description: "Sciences sociales, cartographie et dataviz en Nouvelle-Calédonie"
  site-url: "https://jbrouillon.github.io/contours-nc/"
  navbar:
    title: "Contours"
    left:
      - text: "Articles"
        href: articles/index.qmd
      - text: "Dataviz"
        href: dataviz/index.qmd
      - text: "Ressources"
        href: ressources/index.qmd
      - text: "À propos"
        href: about.qmd
    right:
      - icon: github
        href: https://github.com/jbrouillon/contours-nc
  page-footer:
    left: "© Jonas Brouillon"
    right: "Fait avec Quarto"
  search: true

format:
  html:
    theme:
      light: cosmo
    css: styles.css
    toc: true
    toc-location: right
    code-fold: true
    code-summary: "Afficher le code"
    fig-width: 8
    fig-height: 5
    lang: fr

execute:
  freeze: auto
  warning: false
  message: false

editor: visual
